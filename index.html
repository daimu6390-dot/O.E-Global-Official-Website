<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O.E全球唯一官方网站</title>
  <style>
/* ====== 你的CSS 100%原封不动 ====== */
:root{
  --bg:#f3f1ec;
  --card:#ffffff;
  --text:#171717;
  --muted:#666;
  --line:rgba(0,0,0,.1);
  --dark:#111;
  --accent:#f59e0b;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
/* —— 中间CSS全部保持不动（省略展示） —— */
  </style>
</head>
<body>

<!-- ====== 你的原页面完全保留 ====== -->

<!-- ====== 新增：新闻页面（复用 status-page UI） ====== -->
<div class="status-page" id="newsPage">
  <header class="topbar" style="position:sticky;top:0">
    <div class="wrap inner">
      <button class="brand" id="backHomeFromNews">
        <div class="brand-mark">◎</div>
        <div>
          <div class="brand-title">O.E全球唯一官方网站</div>
          <div class="brand-sub">NEWS</div>
        </div>
      </button>
      <button class="btn" id="backNewsBtn" style="margin-left:auto">返回首页</button>
    </div>
  </header>

  <div class="status-shell">
    <div class="status-panel">
      <div class="badge">新闻资讯</div>
      <h2>O.E最新公告</h2>
      <div class="desc">
        这里是新闻正文内容区域。<br><br>
        可用于发布公告、更新、说明等信息。<br>
        当前为示例文本，你可以自行替换。
      </div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="backdrop" id="backdrop"></div>
  <div class="dialog">
    <div class="dialog-top">
      <div>
        <div class="meta">O.E GLOBAL</div>
        <h3 id="modalTitle">O.E</h3>
      </div>
      <button class="close" id="closeModal">✕</button>
    </div>
    <p id="modalBody"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
const toast = document.getElementById('toast');
const homePage = document.getElementById('homePage');
const statusPage = document.getElementById('statusPage');
const newsPage = document.getElementById('newsPage'); // ✅新增
const statusName = document.getElementById('statusName');
const year = document.getElementById('year');
year.textContent = new Date().getFullYear();

const copy = {
  about: { title: 'O.E介绍', body: 'O.E是全国唯一认证的雨中诗·雪中花。' },
  team: { title: '专业团队', body: '章诗瑶 · 超模角色，相关信息尚未完善。' },
  news: { title: '新闻资讯', body: '敬请期待。这里将用于发布 O.E 官方资讯、公告与更新。' }
};

function showModal(key){
  const item = copy[key];
  if(!item) return;
  modalTitle.textContent = item.title;
  modalBody.textContent = item.body;
  modal.classList.add('show');
}
function hideModal(){ modal.classList.remove('show'); }

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

function scrollToSel(sel){
  document.querySelector(sel)?.scrollIntoView({behavior:'smooth', block:'start'});
  document.getElementById('mobileNav').classList.remove('show');
}

function openStatus(name){
  statusName.textContent = name;
  homePage.style.display = 'none';
  statusPage.classList.add('show');
  window.scrollTo(0,0);
}

function backHome(){
  statusPage.classList.remove('show');
  newsPage.classList.remove('show'); // ✅补充
  homePage.style.display = 'block';
  window.scrollTo(0,0);
}

/* ====== 新增：新闻页逻辑 ====== */
function openNews(){
  homePage.style.display = 'none';
  newsPage.classList.add('show');
  window.scrollTo(0,0);
}
function backNews(){
  newsPage.classList.remove('show');
  homePage.style.display = 'block';
  window.scrollTo(0,0);
}

/* ====== 事件绑定 ====== */
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('mobileNav').classList.toggle('show');
});

/* ✅ 这里是唯一逻辑修改 */
document.querySelectorAll('[data-open]').forEach(btn => {
  btn.addEventListener('click', () => {
    if(btn.dataset.open === 'news'){
      openNews();
    }else{
      showModal(btn.dataset.open);
    }
  });
});

document.querySelectorAll('[data-scroll]').forEach(btn => btn.addEventListener('click', () => scrollToSel(btn.dataset.scroll)));

document.getElementById('closeModal').addEventListener('click', hideModal);
document.getElementById('backdrop').addEventListener('click', hideModal);

document.getElementById('goHome').addEventListener('click', () => {
  if(statusPage.classList.contains('show') || newsPage.classList.contains('show')){
    backHome();
  }else{
    window.scrollTo(0,0);
  }
});

document.getElementById('backHome').addEventListener('click', backHome);
document.getElementById('backBtn').addEventListener('click', backHome);

/* ✅ 新增返回绑定 */
document.getElementById('backNewsBtn').addEventListener('click', backNews);
document.getElementById('backHomeFromNews').addEventListener('click', backNews);

document.getElementById('queryBtn').addEventListener('click', () => {
  const name = document.getElementById('queryName').value.trim();
  if(name === '姚遥'){
    openStatus(name);
  }else{
    showToast('尚未查询到事务内容');
  }
});

document.getElementById('complaintForm').addEventListener('submit', (e) => {
  e.preventDefault();
  showToast('收到您的投诉，稍后将有专人负责枪毙您。');
  document.getElementById('complaintText').value = '';
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    hideModal();
  }
});
</script>

</body>
</html>
