<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O.E全球唯一官方网站</title>
  <style>
    :root{
      --bg:#f3f1ec;
      --card:#ffffff;
      --text:#171717;
      --muted:#666;
      --line:rgba(0,0,0,.1);
      --dark:#111;
      --accent:#f59e0b;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    button{cursor:pointer}

    .topbar{
      position:sticky;top:0;z-index:40;
      background:rgba(17,17,17,.97);
      color:#fff;
      padding:14px 16px;
    }

    .wrap{max-width:1280px;margin:0 auto}

    .hero{
      padding:80px 16px;
    }

    h1{font-size:42px;margin:0}
    p{color:#555}

    .actions{margin-top:20px}
    .pill{
      margin-right:10px;
      padding:10px 16px;
      border-radius:20px;
      border:1px solid #ddd;
      background:#fff;
    }

    .card{
      background:#fff;
      border-radius:20px;
      padding:20px;
      margin:20px;
    }
  </style>
</head>

<body>

<header class="topbar">
  O.E全球唯一官方网站
</header>

<section class="hero wrap">
  <h1>O.E全球唯一官方网站</h1>
  <p>立足中国，连接全球。</p>

  <div class="actions">
    <button class="pill" onclick="openNewsPage()">新闻资讯</button>
  </div>
</section>

<div class="card wrap">
  <h2>关于O.E</h2>
  <p>O.E是全国唯一认证的雨中诗·雪中花。</p>
</div>

<script>
function openNewsPage(){
  window.location.href = "news.html";
}
</script>

</body>
</html>
