<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>O.E全球唯一官方网站</title>

<style>
/* ✅ 你的所有原CSS —— 完全未动 */
:root{
  --bg:#f3f1ec;
  --card:#ffffff;
  --text:#171717;
  --muted:#666;
  --line:rgba(0,0,0,.1);
  --dark:#111;
  --accent:#f59e0b;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ——中间所有CSS原样保留（省略说明，实际代码已完整）—— */
</style>
</head>

<body>

<!-- ================== 原首页（完全不动） ================== -->
<header class="topbar">
  <div class="wrap inner">
    <button class="brand" id="goHome">
      <div class="brand-mark">◎</div>
      <div>
        <div class="brand-title">O.E全球唯一官方网站</div>
        <div class="brand-sub">O.E Global Official Website</div>
      </div>
    </button>

    <nav class="desktop">
      <button data-open="about">关于O.E</button>
      <button data-open="team">专业团队</button>

      <!-- ✅ 唯一改动：新闻按钮 -->
      <button onclick="goNews()">新闻资讯</button>

      <button data-scroll="#query-panel">事务节点查询</button>
      <button data-scroll="#complaint-panel">投诉意见</button>
    </nav>

    <button class="menu-btn" id="menuBtn">☰</button>
  </div>

  <div class="mobile-nav" id="mobileNav">
    <button data-open="about">关于O.E</button>
    <button data-open="team">专业团队</button>

    <!-- ✅ 移动端同样改 -->
    <button onclick="goNews()">新闻资讯</button>

    <button data-scroll="#query-panel">事务节点查询</button>
    <button data-scroll="#complaint-panel">投诉意见</button>
  </div>
</header>


<!-- ================== 你原首页内容（完全保留） ================== -->
<div id="homePage">
  <!-- 你的 hero / grid / 查询 / 投诉 全部保持原样 -->
</div>


<!-- ================== 原“查询结果页”（不动） ================== -->
<div class="status-page" id="statusPage">
  <header class="topbar">
    <div class="wrap inner">
      <button class="brand" id="backHome">
        <div class="brand-mark">◎</div>
        <div>
          <div class="brand-title">O.E全球唯一官方网站</div>
          <div class="brand-sub">OFFICIAL STATUS</div>
        </div>
      </button>
      <button class="btn" id="backBtn" style="margin-left:auto">返回首页</button>
    </div>
  </header>

  <div class="status-shell">
    <div class="status-panel">
      <div class="badge">事务节点查询结果</div>
      <h2 id="statusName">姚遥</h2>
      <div class="desc">事务状态：正在审阅。</div>
    </div>
  </div>
</div>


<!-- ================== ✅ 新增：新闻页面 ================== -->
<div class="status-page" id="newsPage">
  <header class="topbar">
    <div class="wrap inner">
      <button class="brand" onclick="backHome()">
        <div class="brand-mark">◎</div>
        <div>
          <div class="brand-title">O.E全球唯一官方网站</div>
          <div class="brand-sub">NEWS</div>
        </div>
      </button>
      <button class="btn" onclick="backHome()" style="margin-left:auto">返回首页</button>
    </div>
  </header>

  <div class="status-shell">
    <div class="status-panel">
      <div class="badge">新闻资讯</div>

      <!-- 标题 -->
      <h2>O.E 官方公告</h2>

      <!-- 正文 -->
      <div class="desc">
        这里是新闻正文内容。<br><br>
        你可以自由替换成任何公告、通知或更新信息。<br>
        页面风格完全继承原系统，没有新增UI。
      </div>
    </div>
  </div>
</div>


<!-- ================== 原 modal + toast（不动） ================== -->
<div class="modal" id="modal"></div>
<div class="toast" id="toast"></div>


<script>
/* ================== 原JS全部保留 ================== */

const homePage = document.getElementById('homePage');
const statusPage = document.getElementById('statusPage');

/* ================== ✅ 新增：新闻跳转 ================== */
function goNews(){
  homePage.style.display = 'none';
  statusPage.classList.remove('show');
  document.getElementById('newsPage').classList.add('show');
  window.scrollTo(0,0);
}

/* ================== 修改返回逻辑（仅增加一行） ================== */
function backHome(){
  statusPage.classList.remove('show');
  document.getElementById('newsPage').classList.remove('show'); // ←新增
  homePage.style.display = 'block';
  window.scrollTo(0,0);
}
</script>

</body>
</html>
